<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Solo Marble</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #0a0e27; color: white; font-family: sans-serif; overflow: hidden; }
        .ui { position: absolute; top: 0; width: 100%; padding: 15px; background: rgba(26, 31, 58, 0.9); border-bottom: 2px solid #00ff00; text-align: center; box-sizing: border-box; z-index: 10; }
        .btn { background: #00ff00; color: #0a0e27; border: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; margin: 5px; cursor: pointer; font-size: 16px; }
        .btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #canvas-container { width: 100vw; height: 100vh; }
        .win-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; color: #00ff00; font-weight: bold; text-shadow: 0 0 20px #00ff00; display: none; z-index: 20; pointer-events: none; }
    </style>
</head>
<body>

<div class="ui">
    <div>Баланс: <span id="bal" style="color:#00ff00">100</span> TON</div>
    <div style="margin-top: 10px;">
        <button class="btn" id="b1" onclick="startGame(1)">1 TON</button>
        <button class="btn" id="b3" onclick="startGame(3)">3 TON</button>
        <button class="btn" id="b10" onclick="startGame(10)">10 TON</button>
    </div>
</div>

<div id="winPopup" class="win-popup"></div>
<div id="canvas-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

    let balance = parseInt(localStorage.getItem('balance')) || 100;
    let isRacing = false;
    let finishedBalls = 0;
    let totalWinSession = 0;
    const TOTAL_BALLS = 66;

    const engine = Engine.create();
    const w = window.innerWidth;
    const h = window.innerHeight;

    const render = Render.create({
        element: document.getElementById('canvas-container'),
        engine: engine,
        options: { width: w, height: h, wireframes: false, background: '#0a0e27' }
    });

    // Границы
    Composite.add(engine.world, [
        Bodies.rectangle(w/2, h + 10, w, 20, { isStatic: true }),
        Bodies.rectangle(-10, h/2, 20, h, { isStatic: true }),
        Bodies.rectangle(w + 10, h/2, 20, h, { isStatic: true })
    ]);

    // Трасса (препятствия как на твоем чертеже)
    const pins = [
        Bodies.rectangle(w * 0.3, 300, w * 0.5, 10, { isStatic: true, angle: 0.3, render: {fillStyle: '#333'} }),
        Bodies.rectangle(w * 0.7, 450, w * 0.5, 10, { isStatic: true, angle: -0.3, render: {fillStyle: '#333'} }),
        Bodies.rectangle(w * 0.4, 600, w * 0.6, 10, { isStatic: true, angle: 0.2, render: {fillStyle: '#333'} })
    ];
    Composite.add(engine.world, pins);

    // Корзины множителей
    const zones = [
        { x: w * 0.15, label: '0x', color: '#ff4444', mult: 0 },
        { x: w * 0.4, label: '1x', color: '#ffbb00', mult: 1 },
        { x: w * 0.65, label: '2x', color: '#00ccff', mult: 2 },
        { x: w * 0.9, label: '30x', color: '#ff00ff', mult: 30 }
    ];

    zones.forEach(z => {
        const sensor = Bodies.rectangle(z.x, h - 30, 50, 40, { 
            isStatic: true, isSensor: true, render: { fillStyle: z.color }, label: z.label 
        });
        Composite.add(engine.world, sensor);
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    function updateBal() {
        document.getElementById('bal').textContent = balance.toFixed(2);
        localStorage.setItem('balance', balance);
    }

    function startGame(bet) {
        if (balance < bet || isRacing) return;

        isRacing = true;
        balance -= bet;
        updateBal();
        finishedBalls = 0;
        totalWinSession = 0;
        document.getElementById('winPopup').style.display = 'none';
        document.querySelectorAll('.btn').forEach(b => b.disabled = true);

        for (let i = 0; i < TOTAL_BALLS; i++) {
            setTimeout(() => {
                let m;
                if (i < 50) m = 0;      // 50 шаров = 0х
                else if (i < 60) m = 1; // 10 шаров = 1х
                else if (i < 65) m = 2; // 5 шаров = 2х
                else m = 30;            // 1 шар = 30х

                const ball = Bodies.circle(w/2 + (Math.random()*40-20), 80, 8, {
                    restitution: 0.5, 
                    render: { fillStyle: '#00ff00' },
                    customMult: m,
                    betRef: bet
                });
                Composite.add(engine.world, ball);
            }, i * 50);
        }
    }

    Events.on(engine, 'collisionStart', (event) => {
        event.pairs.forEach(pair => {
            const ball = pair.bodyA.circleRadius ? pair.bodyA : (pair.bodyB.circleRadius ? pair.bodyB : null);
            const sensor = pair.bodyA.isSensor ? pair.bodyA : (pair.bodyB.isSensor ? pair.bodyB : null);

            if (ball && sensor) {
                // Математика: каждый шар приносит часть общей ставки * множитель
                const winPart = (ball.betRef / TOTAL_BALLS) * ball.customMult;
                totalWinSession += winPart;
                
                Composite.remove(engine.world, ball);
                finishedBalls++;

                if (finishedBalls === TOTAL_BALLS) {
                    endGame();
                }
            }
        });
    });

    function endGame() {
        isRacing = false;
        const finalWin = Math.round(totalWinSession * 100) / 100;
        balance += finalWin;
        updateBal();

        const pop = document.getElementById('winPopup');
        pop.textContent = finalWin > 0 ? `+${finalWin} TON` : "0 TON";
        pop.style.display = 'block';

        document.querySelectorAll('.btn').forEach(b => b.disabled = false);
        tg.HapticFeedback.notificationOccurred(finalWin > 0 ? 'success' : 'warning');
    }

    updateBal();
</script>
</body>
</html>
