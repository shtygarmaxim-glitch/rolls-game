<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rolls - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ff00; --primary-dark: #00cc00; --secondary: #00d4ff;
            --success: #28a745; --danger: #ff5733; --warning: #ffb800;
            --dark-bg: #0a0e27; --card-bg: #1a1f3a; --text-primary: #ffffff;
            --text-secondary: #a0a0a0; --border: #2a2f4a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg); color: var(--text-primary); overflow-x: hidden;
        }
        .app { display: flex; flex-direction: column; min-height: 100vh; }
        .page { display: none; padding: 20px; padding-bottom: 90px; }
        .page.active { display: block; }
        .btn {
            padding: 14px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: var(--dark-bg); }
        .btn-success { background: var(--success); color: white; }
        .balance-card {
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px;
            border: 1px solid var(--primary); text-align: center; margin-bottom: 20px;
        }
        .balance-amount { font-size: 36px; font-weight: bold; color: var(--primary); }
        .wheel-container { position: relative; margin: 20px auto; width: 300px; height: 300px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--border); }
        .wheel-pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent;
            border-right: 15px solid transparent; border-top: 25px solid var(--primary); z-index: 10;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; display: flex;
            background: var(--card-bg); border-top: 1px solid var(--border); height: 70px;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); background: none; border: none; }
        .nav-item.active { color: var(--primary); }
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 15px; text-align: center; width: 80%; border: 1px solid var(--primary); }
        .participants-list { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .participant { padding: 10px; border: 1px solid var(--border); border-radius: 10px; min-width: 80px; text-align: center; }
        .participant.selected { border-color: var(--primary); background: rgba(0,255,0,0.1); }
    </style>
</head>
<body>
    <div class="app">
        <div id="wheel-page" class="page active">
            <div class="balance-card">
                <div>Ваш баланс</div>
                <div class="balance-amount"><span id="balance">100</span> TON</div>
                <button class="btn btn-success" onclick="claimFree()">🎁 Бонус</button>
            </div>
            
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="300" height="300"></canvas>
            </div>

            <button id="spinBtn" class="btn btn-primary" onclick="spin()">КРУТИТЬ</button>
            
            <h3 style="margin-top:20px">Выбери противника:</h3>
            <div id="participants" class="participants-list"></div>
        </div>

        <div id="profile-page" class="page">
            <h2>Профиль</h2>
            <div id="userInfo" style="margin-top: 20px;"></div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showPage('wheel')">🎡 Игра</button>
            <button class="nav-item" onclick="showPage('profile')">👤 Профиль</button>
        </nav>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <p id="modalText"></p>
            <button class="btn btn-primary" onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let balance = parseInt(localStorage.getItem('balance')) || 100;
        let isSpinning = false;
        let currentRotation = 0;
        let selectedOpponent = null;

        const participants = [
            { name: "Robot", avatar: "🤖", color: "#ff5733" },
            { name: "Alien", avatar: "👾", color: "#00d4ff" },
            { name: "Ghost", avatar: "👻", color: "#ffb800" },
            { name: "Cat", avatar: "🐱", color: "#ff00ff" }
        ];

        function updateUI() {
            document.getElementById('balance').textContent = balance;
            localStorage.setItem('balance', balance);
        }

        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(name + '-page').classList.add('active');
            if(name === 'profile') {
                const user = tg.initDataUnsafe.user || { first_name: "Гость", id: "000" };
                document.getElementById('userInfo').innerHTML = `Имя: ${user.first_name}<br>ID: ${user.id}`;
            }
        }

        function initWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const slice = (2 * Math.PI) / participants.length;
            
            ctx.clearRect(0,0,300,300);
            participants.forEach((p, i) => {
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 140, i * slice + currentRotation, (i+1) * slice + currentRotation);
                ctx.fill();
                ctx.save();
                ctx.translate(150,150);
                ctx.rotate(i * slice + slice/2 + currentRotation);
                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.fillText(p.avatar, 80, 5);
                ctx.restore();
            });
        }

        function renderParticipants() {
            const container = document.getElementById('participants');
            container.innerHTML = '';
            participants.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'participant' + (selectedOpponent === i ? ' selected' : '');
                div.innerHTML = `${p.avatar}<br>${p.name}`;
                div.onclick = () => { selectedOpponent = i; renderParticipants(); };
                container.appendChild(div);
            });
        }

        function spin() {
            if (isSpinning || selectedOpponent === null) {
                if(selectedOpponent === null) alert("Выбери противника!");
                return;
            }
            if (balance < 10) return alert("Нужно хотя бы 10 TON");

            balance -= 10;
            updateUI();
            isSpinning = true;
            
            const extraSpins = 5 + Math.random() * 5;
            const duration = 3000;
            const start = performance.now();
            const startRotation = currentRotation;
            const targetRotation = startRotation + extraSpins * Math.PI * 2;

            function animate(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                currentRotation = startRotation + (targetRotation - startRotation) * easeOut;
                initWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    checkWinner();
                }
            }
            requestAnimationFrame(animate);
        }

        function checkWinner() {
            const slice = (2 * Math.PI) / participants.length;
            const normalized = (currentRotation + (Math.PI * 1.5)) % (Math.PI * 2);
            const winnerIdx = participants.length - 1 - Math.floor(normalized / slice) % participants.length;
            
            if (winnerIdx === selectedOpponent) {
                balance += 25;
                showModal("ПОБЕДА!", "Ты выиграл 25 TON!");
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                showModal("ПРОИГРЫШ", "Победил " + participants[winnerIdx].name);
            }
            updateUI();
        }

        function showModal(title, text) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        function claimFree() {
            balance += 5;
            updateUI();
            alert("Получено 5 TON!");
        }

        renderParticipants();
        initWheel();
        updateUI();
    </script>
</body>
</html>
