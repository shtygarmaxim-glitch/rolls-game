<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rolls Online - PvP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ff00; --dark-bg: #0a0e27; --card-bg: #1a1f3a;
            --text-primary: #ffffff; --border: #2a2f4a;
        }
        body {
            font-family: sans-serif; background: var(--dark-bg); color: var(--text-primary);
            padding-bottom: 80px;
        }
        .page { padding: 20px; display: none; }
        .page.active { display: block; }
        
        /* Баланс и Ставки */
        .balance-card {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            border: 1px solid var(--primary); text-align: center; margin-bottom: 20px;
        }
        .bet-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .bet-btn {
            background: var(--dark-bg); border: 1px solid var(--border);
            color: white; padding: 10px; border-radius: 8px; cursor: pointer;
        }
        .bet-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0,255,0,0.1); }

        /* Колесо */
        .wheel-box { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #wheelCanvas { width: 100%; height: 100%; }
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 25px solid var(--primary); z-index: 10;
        }

        /* Список игр */
        .game-list { margin-top: 20px; }
        .game-item {
            background: var(--card-bg); padding: 15px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--primary); color: var(--dark-bg); width: 100%; }
        .btn-accept { background: #28a745; color: white; padding: 8px 15px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--card-bg); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #888; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="game-page" class="page active">
        <div class="balance-card">
            <div>Твой баланс: <strong id="balanceDisplay">100</strong> TON</div>
            <div class="bet-selector">
                <button class="bet-btn active" onclick="selectBet(1, this)">1</button>
                <button class="bet-btn" onclick="selectBet(2, this)">2</button>
                <button class="bet-btn" onclick="selectBet(5, this)">5</button>
                <button class="bet-btn" onclick="selectBet(10, this)">10</button>
            </div>
            <button class="btn btn-primary" onclick="createGame()">СОЗДАТЬ ИГРУ</button>
        </div>

        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="300" height="300"></canvas>
        </div>

        <div class="game-list">
            <h3>Доступные игры (PvP):</h3>
            <div id="lobby">
                <p style="color: #666; margin-top: 10px;">Поиск активных ставок...</p>
            </div>
        </div>
    </div>

    <div id="profile-page" class="page">
        <h2>Профиль</h2>
        <p id="userStatus">Загрузка данных из Telegram...</p>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="showPage('game', this)">🎡 Игра</div>
        <div class="nav-item" onclick="showPage('profile', this)">👤 Профиль</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        const socket = io(); // Подключаемся к серверу
        tg.expand();

        let myBalance = parseInt(localStorage.getItem('balance')) || 100;
        let selectedBet = 1;
        let isSpinning = false;
        
        const user = tg.initDataUnsafe.user || { first_name: "Игрок", id: 0 };

        // Сообщаем серверу, что мы зашли
        socket.emit('playerJoin', { name: user.first_name, id: user.id });

        function updateBalance() {
            document.getElementById('balanceDisplay').textContent = myBalance;
            localStorage.setItem('balance', myBalance);
        }

        function selectBet(amount, btn) {
            selectedBet = amount;
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        function showPage(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + '-page').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // Логика онлайн-лобби
        function createGame() {
            if (myBalance < selectedBet) return alert("Недостаточно TON!");
            socket.emit('createBet', { amount: selectedBet, userName: user.first_name });
            tg.showConfirm(`Выставили ${selectedBet} TON. Ждем оппонента...`);
        }

        socket.on('updateLobby', (games) => {
            const lobby = document.getElementById('lobby');
            if (games.length === 0) {
                lobby.innerHTML = '<p style="color: #666;">Активных игр нет. Будь первым!</p>';
                return;
            }
            lobby.innerHTML = games.map(g => `
                <div class="game-item">
                    <span>${g.userName} (<strong>${g.amount} TON</strong>)</span>
                    <button class="btn btn-accept" onclick="acceptGame('${g.id}', ${g.amount})">Принять</button>
                </div>
            `).join('');
        });

        function acceptGame(gameId, amount) {
            if (myBalance < amount) return alert("У тебя меньше TON, чем в ставке!");
            socket.emit('joinGame', { gameId, participantName: user.first_name });
        }

        // Логика анимации колеса (визуальная часть)
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        function drawWheel(rotation = 0) {
            const colors = ['#ff5733', '#33ff57', '#3357ff', '#f333ff'];
            const slice = (Math.PI * 2) / 4;
            ctx.clearRect(0, 0, 300, 300);
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 140, i * slice + rotation, (i + 1) * slice + rotation);
                ctx.fill();
            }
        }

        socket.on('startGameAnimation', (data) => {
            // Когда сервер говорит, что два игрока сошлись — крутим!
            isSpinning = true;
            let rotation = 0;
            let speed = 0.5;
            const timer = setInterval(() => {
                rotation += speed;
                drawWheel(rotation);
                speed *= 0.98; // Замедление
                if (speed < 0.01) {
                    clearInterval(timer);
                    isSpinning = false;
                    alert("Игра окончена! Победил: " + data.winner);
                }
            }, 30);
        });

        drawWheel();
        updateBalance();
    </script>
</body>
</html>
