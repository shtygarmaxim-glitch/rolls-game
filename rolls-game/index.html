<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolls Jackpot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0e27; color: white; text-align: center; padding: 10px; }
        .stats { background: #1a1f3a; padding: 15px; border-radius: 15px; border: 1px solid #00ff00; margin-bottom: 15px; }
        .timer-box { font-size: 24px; color: #ffb800; margin: 10px 0; font-weight: bold; min-height: 30px; }
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 0 auto; }
        canvas { width: 100%; height: 100%; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #00ff00; z-index: 10; }
        .bet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }
        .btn { background: #00ff00; color: #0a0e27; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: bold; }
        .player-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2a2f4a; font-size: 14px; }
    </style>
</head>
<body>

    <div class="stats">
        <div>Ваш баланс: <b id="bal" style="color:#00ff00">100</b> TON</div>
        <div class="timer-box" id="timerDisplay">Ожидание игроков...</div>
        <div class="bet-grid" id="betBtns">
            <button onclick="join(1)" style="padding:10px">1</button>
            <button onclick="join(2)" style="padding:10px">2</button>
            <button onclick="join(5)" style="padding:10px">5</button>
            <button onclick="join(10)" style="padding:10px">10</button>
        </div>
    </div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>

    <div id="playerList" style="margin-top:20px; background:#1a1f3a; border-radius:10px; padding:10px"></div>

    <script>
        const tg = window.Telegram.WebApp;
        const socket = io();
        let balance = parseInt(localStorage.getItem('balance')) || 100;
        let currentRoom = { players: [] };
        const user = tg.initDataUnsafe.user || { first_name: "Игрок_" + Math.floor(Math.random()*100) };

        function updateBal() {
            document.getElementById('bal').textContent = balance;
            localStorage.setItem('balance', balance);
        }

        function join(amt) {
            if (balance < amt) return alert("Мало TON");
            balance -= amt;
            updateBal();
            socket.emit('joinGame', { amount: amt, userName: user.first_name });
            tg.HapticFeedback.impactOccurred('medium');
        }

        socket.on('updateRoom', (room) => {
            currentRoom = room;
            renderPlayers();
            if (room.status === 'waiting') {
                document.getElementById('timerDisplay').textContent = "Ожидание игроков (минимум 2)...";
                drawWheel(0);
            }
        });

        socket.on('timerTick', (sec) => {
            document.getElementById('timerDisplay').textContent = `До начала: ${sec} сек!`;
            tg.HapticFeedback.selectionChanged();
        });

        socket.on('startGameAnimation', (data) => {
            let rotation = 0;
            let speed = 0.7;
            const interval = setInterval(() => {
                rotation += speed;
                drawWheel(rotation, data.players);
                speed *= 0.985;
                if (speed < 0.005) {
                    clearInterval(interval);
                    document.getElementById('timerDisplay').textContent = `Победил: ${data.winner}!`;
                    if (user.first_name === data.winner) {
                        balance += data.totalBank * 0.95;
                        updateBal();
                        tg.showAlert("💰 ВЫ ВЫИГРАЛИ " + (data.totalBank * 0.95).toFixed(2) + " TON!");
                    }
                }
            }, 30);
        });

        function renderPlayers() {
            const list = document.getElementById('playerList');
            const total = currentRoom.players.reduce((s, p) => s + p.amount, 0);
            list.innerHTML = `<b>БАНК: ${total} TON</b><br>`;
            currentRoom.players.forEach(p => {
                const perc = ((p.amount / total) * 100).toFixed(0);
                list.innerHTML += `<div class="player-item">
                    <span style="color:${p.color}">● ${p.name}</span>
                    <span>${p.amount} TON (${perc}%)</span>
                </div>`;
            });
        }

        const ctx = document.getElementById('wheelCanvas').getContext('2d');
        function drawWheel(rot, players = currentRoom.players) {
            ctx.clearRect(0,0,400,400);
            if (players.length === 0) {
                ctx.beginPath(); ctx.fillStyle = '#2a2f4a'; ctx.arc(200,200,180,0,Math.PI*2); ctx.fill();
                return;
            }
            
            const total = players.reduce((s, p) => s + p.amount, 0);
            let currentAngle = rot;

            players.forEach(p => {
                const sliceAngle = (p.amount / total) * Math.PI * 2;
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.moveTo(200,200);
                ctx.arc(200,200,180, currentAngle, currentAngle + sliceAngle);
                ctx.fill();
                ctx.strokeStyle = '#0a0e27'; ctx.lineWidth = 2; ctx.stroke();

                // Текст (имя)
                ctx.save();
                ctx.translate(200,200);
                ctx.rotate(currentAngle + sliceAngle/2);
                ctx.fillStyle = "white";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(p.name, 70, 5);
                ctx.restore();

                currentAngle += sliceAngle;
            });
        }

        drawWheel(0);
        updateBal();
    </script>
</body>
</html>
