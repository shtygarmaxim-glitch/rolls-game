<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мины с балансом</title>
<style>
    body { margin:0; font-family:sans-serif; background:#0a0e27; color:white; display:flex; flex-direction:column; align-items:center; padding:20px; }
    .ui { text-align:center; margin-bottom:10px; }
    .grid { display:grid; grid-template-columns: repeat(5, 60px); gap:5px; margin-top:20px; }
    .cell { width:60px; height:60px; background:#1a1f3a; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; font-size:18px; border-radius:5px; }
    .cell.revealed { background:#444; cursor:default; }
    .cell.mine { background:#ff4444; color:#fff; }
    .cell.safe { background:#00ff00; color:#000; }
    .btn { background:#00ff00; color:#0a0e27; border:none; padding:10px 15px; margin:5px; font-weight:bold; border-radius:5px; cursor:pointer; }
    select { margin:5px; padding:5px; border-radius:5px; font-weight:bold; }
</style>
</head>
<body>

<div class="ui">
    Баланс: <span id="bal">100</span> TON<br>
    Ставка: <select id="bet">
        <option value="1">1 TON</option>
        <option value="3">3 TON</option>
        <option value="5">5 TON</option>
        <option value="10">10 TON</option>
    </select>
    Мины: <select id="mines">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select><br>
    <button class="btn" id="startBtn">Начать игру</button>
</div>

<div class="grid" id="grid"></div>

<script>
const gridEl = document.getElementById('grid');
const balEl = document.getElementById('bal');
const startBtn = document.getElementById('startBtn');
const betEl = document.getElementById('bet');
const minesEl = document.getElementById('mines');

let balance = Number(localStorage.getItem('balance')) || 100;
let gameActive = false;
let cells = [];
let mineIndexes = [];

function updateBal() {
    balEl.textContent = balance.toFixed(2);
    localStorage.setItem('balance', balance);
}

// Добавляем каждые 10 минут +10 TON
setInterval(()=>{
    balance += 10;
    updateBal();
}, 10*60*1000); // 10 минут в мс

function startGame() {
    const bet = Number(betEl.value);
    const mineCount = Number(minesEl.value);
    if(balance < bet){
        alert('Недостаточно TON!');
        return;
    }
    balance -= bet;
    updateBal();
    gameActive = true;
    gridEl.innerHTML='';
    cells=[];
    mineIndexes = [];
    // генерируем мины
    while(mineIndexes.length < mineCount){
        const idx = Math.floor(Math.random()*25);
        if(!mineIndexes.includes(idx)) mineIndexes.push(idx);
    }
    for(let i=0;i<25;i++){
        const cell = document.createElement('div');
        cell.className='cell';
        cell.dataset.index=i;
        cell.addEventListener('click',()=>onCellClick(i,bet));
        gridEl.appendChild(cell);
        cells.push(cell);
    }
}

function onCellClick(idx,bet){
    if(!gameActive) return;
    const cell = cells[idx];
    if(cell.classList.contains('revealed')) return;
    cell.classList.add('revealed');
    if(mineIndexes.includes(idx)){
        cell.classList.add('mine');
        alert('БА-БАХ! Мина! Ставка проиграна.');
        gameActive=false;
    } else {
        cell.classList.add('safe');
        const win = bet * 2; // выигрыш за безопасную клетку
        balance += win;
        updateBal();
        const safeCellsLeft = cells.filter((c,i)=>!c.classList.contains('revealed') && !mineIndexes.includes(i)).length;
        if(safeCellsLeft===0){
            alert('Поздравляем! Вы открыли все безопасные клетки!');
            gameActive=false;
        }
    }
}

startBtn.addEventListener('click',startGame);
updateBal();
</script>

</body>
</html>
