<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Marble Race</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #0a0e27; color: white; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 0; width: 100%; z-index: 10; pointer-events: none; }
        .controls { pointer-events: auto; background: rgba(26, 31, 58, 0.9); padding: 15px; border-bottom: 2px solid #00ff00; text-align: center; }
        .btn { background: #00ff00; color: #0a0e27; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin: 5px; }
        .timer { font-size: 22px; color: #ffb800; font-weight: bold; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<div id="ui">
    <div class="controls">
        <div>Баланс: <span id="bal" style="color:#00ff00; font-weight:bold">100</span> TON</div>
        <div id="status" class="timer">Нужно 2 игрока...</div>
        <button class="btn" onclick="sendBet(1)">1 TON</button>
        <button class="btn" onclick="sendBet(5)">5 TON</button>
    </div>
</div>
<div id="canvas-container"></div>

<script>
    const tg = window.Telegram.WebApp;
    const socket = io();
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;

    let balance = parseInt(localStorage.getItem('balance')) || 100;
    const user = tg.initDataUnsafe.user || { first_name: "Игрок_" + Math.floor(Math.random()*100) };
    const myColor = '#' + Math.floor(Math.random()*16777215).toString(16);

    const engine = Engine.create();
    const render = Render.create({
        element: document.getElementById('canvas-container'),
        engine: engine,
        options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#0a0e27' }
    });

    const w = window.innerWidth; const h = window.innerHeight;
    const ground = Bodies.rectangle(w/2, h + 10, w, 20, { isStatic: true });
    const leftWall = Bodies.rectangle(-10, h/2, 20, h, { isStatic: true });
    const rightWall = Bodies.rectangle(w + 10, h/2, 20, h, { isStatic: true });
    const gate = Bodies.rectangle(w/2, 170, w, 15, { isStatic: true, render: { fillStyle: '#ff5733' } });

    // Твоя трасса
    const obs = [
        Bodies.rectangle(w * 0.3, 350, w * 0.6, 10, { isStatic: true, angle: 0.3 }),
        Bodies.rectangle(w * 0.7, 500, w * 0.6, 10, { isStatic: true, angle: -0.3 }),
        Bodies.rectangle(w * 0.4, 650, w * 0.7, 10, { isStatic: true, angle: 0.2 }),
        Bodies.rectangle(w/2, h - 80, 120, 10, { isStatic: true, render: {fillStyle: '#00ff00'} }) // Финиш
    ];

    Composite.add(engine.world, [ground, leftWall, rightWall, gate, ...obs]);
    Render.run(render);
    Runner.run(Runner.create(), engine);

    function sendBet(amount) {
        if (balance < amount) return;
        balance -= amount;
        document.getElementById('bal').textContent = balance;
        localStorage.setItem('balance', balance);
        socket.emit('bet', { name: user.first_name, amount: amount, color: myColor });
        for(let i=0; i<amount; i++) {
            const ball = Bodies.circle(w/2 + (Math.random()*40-20), 80 + (Math.random()*40), 10, {
                restitution: 0.5, render: { fillStyle: myColor }, label: user.first_name
            });
            Composite.add(engine.world, ball);
        }
    }

    socket.on('timer', (time) => { document.getElementById('status').textContent = `Старт: ${time}с`; });
    socket.on('startRace', () => { 
        document.getElementById('status').textContent = "ГОНКА!";
        Composite.remove(engine.world, gate); 
    });

    let winnerFound = false;
    Events.on(engine, 'afterUpdate', () => {
        if (winnerFound) return;
        Composite.allBodies(engine.world).forEach(body => {
            if (body.position.y > h - 40 && body.circleRadius) {
                winnerFound = true;
                socket.emit('winner', { name: body.label });
            }
        });
    });

    socket.on('announceWinner', (data) => {
        document.getElementById('status').textContent = `WIN: ${data.name}`;
        tg.showAlert("🏆 Победил: " + data.name);
    });

    socket.on('init', () => { location.reload(); });
</script>
</body>
</html>
